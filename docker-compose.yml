services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Docker Compose inyectará estos valores si están presentes en tu entorno o en el archivo .env
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    # Pasamos ambos archivos de entorno al contenedor en tiempo de ejecución
    env_file:
      - .env
      - .env.local
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
